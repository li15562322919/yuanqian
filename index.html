<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义真随机大转盘</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            gap: 40px;
            max-width: 900px;
            width: 100%;
        }
        /* 左侧设置区 */
        .settings {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .settings h3 {
            margin: 0;
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            flex: 1;
            resize: vertical;
            min-height: 200px;
        }
        button {
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }
        /* 右侧转盘区 */
        .wheel-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #wheelTitleDisplay {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        /* 固定的指针 */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.3));
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            /* 旋转动画由 JS 控制 */
        }
        #spinBtn {
            margin-top: 30px;
            background-color: #e74c3c;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 40px;
            border-radius: 30px;
        }
        #spinBtn:hover {
            background-color: #c0392b;
        }
        #resultDisplay {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            min-height: 30px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .wheel-container {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="settings">
        <h3>配置转盘</h3>
        <label>转盘名称：</label>
        <input type="text" id="titleInput" value="今天吃什么？">
        
        <label>转盘选项（每行一个）：</label>
        <textarea id="optionsInput">火锅
烧烤
麻辣烫
肯德基
麦当劳
日料
自己做饭
饿着</textarea>
        
        <button id="updateBtn">更新转盘数据</button>
    </div>

    <div class="wheel-section">
        <div id="wheelTitleDisplay">今天吃什么？</div>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <button id="spinBtn">开始转动</button>
        <div id="resultDisplay"></div>
    </div>
</div>

<script>
    // 元素获取
    const titleInput = document.getElementById('titleInput');
    const optionsInput = document.getElementById('optionsInput');
    const updateBtn = document.getElementById('updateBtn');
    const wheelTitleDisplay = document.getElementById('wheelTitleDisplay');
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultDisplay = document.getElementById('resultDisplay');

    // 转盘状态
    let options = [];
    let currentRotation = 0; // 当前旋转的总角度
    let isSpinning = false;

    // 常用好看的颜色盘
    const colors = ["#FF6B6B", "#4ECDC4", "#45B7D1", "#FDCB6E", "#6C5CE7", "#55E6C1", "#FD79A8", "#A8E6CF", "#FFD3B6", "#FFAAA5"];

    // 初始化
    function init() {
        updateWheelData();
        drawWheel();
    }

    // 更新数据
    function updateWheelData() {
        wheelTitleDisplay.innerText = titleInput.value;
        // 获取文本框内容，按换行符分割，并过滤掉空行
        options = optionsInput.value.split('\n').map(item => item.trim()).filter(item => item !== '');
        
        if(options.length === 0) {
            options = ["未设置选项"];
        }
        
        // 重置转盘角度和结果
        currentRotation = 0;
        canvas.style.transition = 'none';
        canvas.style.transform = `rotate(0deg)`;
        resultDisplay.innerText = '';
        
        drawWheel();
    }

    // 绘制转盘
    function drawWheel() {
        const numOptions = options.length;
        const arcSize = (2 * Math.PI) / numOptions;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < numOptions; i++) {
            const angle = i * arcSize - Math.PI / 2; // 减去 PI/2 是为了让第一个扇形从正上方开始

            // 画扇形
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
            ctx.lineTo(centerX, centerY);
            ctx.fill();
            ctx.stroke();
            
            // 画分隔线
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#ffffff";
            ctx.stroke();

            // 绘制文字
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle + arcSize / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 24px 'Segoe UI', sans-serif";
            
            // 文字防重叠截断逻辑
            let text = options[i];
            if (text.length > 8) text = text.substring(0, 8) + '...';
            
            ctx.fillText(text, radius - 30, 8);
            ctx.restore();
        }
    }

    // Web Crypto API 真随机生成器 (返回 0 到 1 之间的小数)
    function getSecureRandom() {
        const randomBuffer = new Uint32Array(1);
        window.crypto.getRandomValues(randomBuffer);
        return randomBuffer[0] / (0xffffffff + 1);
    }

    // 点击开始抽奖
    spinBtn.addEventListener('click', () => {
        if (isSpinning || options.length === 0) return;
        isSpinning = true;
        spinBtn.disabled = true;
        updateBtn.disabled = true;
        resultDisplay.innerText = '转动中...';

        // 基础圈数 (5到8圈)
        const baseSpins = 360 * 6;
        
        // 真随机计算额外偏转角度
        const randomFraction = getSecureRandom();
        const extraDegrees = randomFraction * 360;
        
        // 计算最终角度
        currentRotation += baseSpins + extraDegrees;

        // 执行 CSS 旋转动画，使用 cubic-bezier 制造由快到慢的真实物理阻尼感
        canvas.style.transition = 'transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)';
        canvas.style.transform = `rotate(${currentRotation}deg)`;
    });

    // 动画结束，计算结果
    canvas.addEventListener('transitionend', () => {
        if(!isSpinning) return;
        isSpinning = false;
        spinBtn.disabled = false;
        updateBtn.disabled = false;

        // 计算当前停留的度数 (映射到 0-360)
        const normalizedDeg = currentRotation % 360;
        
        // 因为画布顺时针旋转了 normalizedDeg，
        // 对于顶部（固定指针）来说，相当于在原始画布上逆时针走了 normalizedDeg。
        // 所以当前指着的角度是：
        const pointerDeg = (360 - normalizedDeg) % 360;
        
        // 计算每一块扇形占多少度
        const sliceDeg = 360 / options.length;
        
        // 计算指针落在了哪个索引的扇形上
        const winningIndex = Math.floor(pointerDeg / sliceDeg);

        // 显示结果
        resultDisplay.innerText = `🎉 结果：${options[winningIndex]} 🎉`;
    });

    // 绑定更新按钮
    updateBtn.addEventListener('click', updateWheelData);

    // 页面加载完成初始化
    init();
</script>
</body>
</html>
